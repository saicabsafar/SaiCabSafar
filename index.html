<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Shirdi</title>
    <style>
        body { font-family: sans-serif; background: #f3f1f7; padding: 20px; }
        .fleet-container { display: grid; gap: 20px; }
        .fleet-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .fleet-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

<h2 style="text-align:center;">हमारी गाड़ियाँ</h2>
<div class="fleet-container">
    <div class="fleet-card">
        <img src="sedan.jpg.jpg" class="fleet-img" alt="Sedan">
        <h3>Sedan (Dzire / Etios)</h3>
    </div>
    <div class="fleet-card">
        <img src="InnovaCrysta.jpg.jpeg" class="fleet-img" alt="Innova Crysta">
        <h3>Innova Crysta</h3>
    </div>
    <div class="fleet-card">
        <img src="TempoTraveller.jpg.jpeg" class="fleet-img" alt="Tempo Traveller">
        <h3>Tempo Traveller</h3>
    </div>
    <div class="fleet-card">
        <img src="ertiga.jpg.jpeg" class="fleet-img" alt="Ertiga">
        <h3>Ertiga</h3>
    </div>
    <div class="fleet-card">
        <img src="hatchback.jpg.webp" class="fleet-img" alt="Hatchback">
        <h3>Hatchback</h3>
    </div>
</div>

</body>
</html>
