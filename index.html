<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0a1f44; --accent: #ffc107; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .hero { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .box { background: white; margin: 15px; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; background: #eee; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--accent); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-book { background: var(--accent); border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">SAI CAB SAFAR</div>

<div class="box">
    <div class="tab-bar">
        <div class="tab active" onclick="this.classList.add('active'); document.querySelectorAll('.tab')[1].classList.remove('active')">ONE WAY</div>
        <div class="tab" onclick="this.classList.add('active'); document.querySelectorAll('.tab')[0].classList.remove('active')">ROUND TRIP</div>
    </div>
    
    <select id="cabType">
        <option>Hatchback</option><option>Sedan</option><option>SUV</option>
        <option>Innova Crysta</option><option>Tempo Traveller</option>
    </select>
    
    <input type="text" id="from" placeholder="From (Pickup)" required>
    <input type="text" id="to" placeholder="To (Drop)" required>
    
    <button class="btn-book" onclick="bookNow()">CHECK PRICE & BOOK NOW</button>
</div>

<script>
    function bookNow() {
        let from = document.getElementById('from').value;
        let to = document.getElementById('to').value;
        let cab = document.getElementById('cabType').value;
        
        if (from === "" || to === "") {
            alert("कृपया सभी जानकारी भरें!");
        } else {
            let msg = `Booking: ${cab}%0AFrom: ${from}%0ATo: ${to}`;
            window.open("https://wa.me/919049133130?text=" + msg, "_blank");
        }
    }
</script>

</body>
</html>
