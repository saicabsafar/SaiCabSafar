<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar | Professional Taxi Booking</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0a1f44; --accent: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; }
        
        /* Header Section */
        header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; }
        
        /* Booking Box */
        .booking-box { background: white; margin: -20px 15px 20px 15px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 4px solid var(--accent); }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; background: #eee; text-align: center; border-radius: 4px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-book { background: var(--accent); color: var(--primary); padding: 15px; width: 100%; border: none; font-weight: bold; font-size: 16px; border-radius: 4px; }
        
        /* Content Sections */
        .section { padding: 20px; background: white; margin-top: 15px; }
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .feature-card { background: #f9f9f9; padding: 15px; text-align: center; border-radius: 8px; }
        
        /* WhatsApp Button */
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 20px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>SAI CAB SAFAR</header>

<div class="booking-box">
    <div class="tab-bar"><div class="tab">ONE WAY</div><div class="tab">ROUND TRIP</div></div>
    <select id="type"><option>Sedan</option><option>SUV</option></select>
    <input type="text" id="from" placeholder="From (Pickup)">
    <input type="text" id="to" placeholder="To (Drop)">
    <input type="date" id="date">
    <button class="btn-book" onclick="bookNow()">CHECK PRICE & BOOK NOW</button>
</div>

<div class="section">
    <h2>Why travel with Sai Cab Safar?</h2>
    <div class="feature-grid">
        <div class="feature-card"><i class="fa fa-car"></i><br>Safe Rides</div>
        <div class="feature-card"><i class="fa fa-user-tie"></i><br>Pro Drivers</div>
        <div class="feature-card"><i class="fa fa-clock"></i><br>24/7 Support</div>
        <div class="feature-card"><i class="fa fa-spray-can"></i><br>Clean Cabs</div>
    </div>
</div>

<a href="https://wa.me/919049133130" class="wa-float"><i class="fab fa-whatsapp"></i> Chat</a>

<script>
    function bookNow() {
        let from = document.getElementById('from').value;
        let to = document.getElementById('to').value;
        let date = document.getElementById('date').value;
        window.open(`https://wa.me/919049133130?text=Booking: From ${from} to ${to} on ${date}`, '_blank');
    }
</script>
</body>
</html>
