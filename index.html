<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaiCabSafar - Taxi Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body { font-family: Arial; margin:0; background:#f5f5f5; }
  header { background:#ffc107; padding:15px; text-align:center; }
  header img.logo { max-height:50px; margin-bottom:10px; }
  section { padding:20px; }
  .box { background:#fff; padding:20px; border-radius:8px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  input, select, button { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; }
  button.call { background:green; color:#fff; border:none; }
  button.wa { background:#25D366; color:#fff; border:none; }
  .rates p { margin:5px 0; font-weight:bold; }
  @media(max-width:600px) { header img.logo { max-height:40px; } }
</style>

<script>
function setLang(lang){
  document.querySelectorAll("[data-en],[data-hi],[data-mr]").forEach(el=>{
    if(lang=='en') el.innerText = el.getAttribute("data-en");
    if(lang=='hi') el.innerText = el.getAttribute("data-hi");
    if(lang=='mr') el.innerText = el.getAttribute("data-mr");
  });
}
</script>
</head>

<body onload="setLang('en')">

<header>
  <img src="logo.png" alt="SaiCabSafar Logo" class="logo">
  <h1 data-en="SaiCabSafar" data-hi="साई कैब सफर" data-mr="साई कॅब सफर">SaiCabSafar</h1>
  <p data-en="Call: 9850063242" data-hi="कॉल: 9850063242" data-mr="कॉल: 9850063242">9850063242</p>
  <div class="lang">
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('hi')">हिंदी</button>
    <button onclick="setLang('mr')">मराठी</button>
  </div>
</header>

<section>
  <div class="box">
    <h2 data-en="Book a Taxi" data-hi="टैक्सी बुक करें" data-mr="टॅक्सी बुक करा">Book a Taxi</h2>
    <input placeholder="Pickup Location">
    <input placeholder="Drop Location">
    <select>
      <option data-en="Local" data-hi="स्थानीय" data-mr="स्थानिक">Local</option>
      <option data-en="One-Way" data-hi="एक तरफा" data-mr="एकमार्गी">One-Way</option>
      <option data-en="Round Trip" data-hi="राउंड ट्रिप" data-mr="राउंड ट्रिप">Round Trip</option>
    </select>
    <input type="date">
    <button data-en="Submit Booking" data-hi="बुकिंग करें" data-mr="बुकिंग करा">Submit Booking</button>
    <a href="tel:9850063242"><button class="call" data-en="Call Now" data-hi="अब कॉल करें" data-mr="आता कॉल करा">Call Now</button></a>
    <a href="https://wa.me/919850063242"><button class="wa" data-en="WhatsApp Booking" data-hi="WhatsApp बुकिंग" data-mr="व्हाट्सअॅप बुकिंग">WhatsApp Booking</button></a>
  </div>
</section>

<section class="box">
  <h2 data-en="Why SaiCabSafar?" data-hi="साई कैब सफर क्यों?" data-mr="साई कॅब सफर का?">Why SaiCabSafar?</h2>
  <p data-en="✔ Verified Drivers ✔ Affordable Fare ✔ 24x7 Service"
     data-hi="✔ सत्यापित ड्राइवर ✔ किफायती किराया ✔ 24x7 सेवा"
     data-mr="✔ प्रमाणित ड्रायव्हर्स ✔ परवडणारे भाडे ✔ 24x7 सेवा">
     ✔ Verified Drivers ✔ Affordable Fare ✔ 24x7 Service
  </p>
  <div class="rates">
    <h3 data-en="Rates Info" data-hi="किराया जानकारी" data-mr="भाडे माहिती">Rates Info</h3>
    <p data-en="Local: ₹300 / One-Way: ₹500 / Round Trip: ₹900" data-hi="स्थानीय: ₹300 / एक तरफा: ₹500 / राउंड ट्रिप: ₹900" data-mr="स्थानिक: ₹300 / एकमार्गी: ₹500 / राउंड ट्रिप: ₹900">Local: ₹300 | One-Way: ₹500 | Round Trip: ₹900</p>
  </div>
</section>

<section class="box">
  <h2 data-en="Service Areas" data-hi="सेवा क्षेत्र" data-mr="सेवा क्षेत्र">Service Areas</h2>
  <p data-en="Shirdi, Ahmednagar, Pune, Mumbai" data-hi="शिरडी, अहमदनगर, पुणे, मुंबई" data-mr="शिर्डी, अहमदनगर, पुणे, मुंबई">Shirdi, Ahmednagar, Pune, Mumbai</p>
</section>

<section class="box">
  <img src="banner.jpg" alt="SaiCabSafar Banner" style="width:100%; border-radius:8px;">
</section>

</body>
</html>
