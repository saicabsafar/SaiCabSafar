<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .hero { background: #0a1f44; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .box { background: white; margin: 15px; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; background: #eee; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tab.active { background: #ffc107; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Date और Time एक लाइन के लिए */
        .date-time-row { display: flex; gap: 10px; }
        .date-time-row input { flex: 1; }

        .btn-add { background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-book { background: #ffc107; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        
        /* Why Travel Section */
        .section { padding: 20px; background: white; margin: 15px; border-radius: 8px; }
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .feature-card { background: #f9f9f9; padding: 10px; text-align: center; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

<div class="hero">SAI CAB SAFAR</div>

<div class="box">
    <div class="tab-bar">
        <div id="tab1" class="tab active" onclick="setTrip('ONE WAY', this)">ONE WAY</div>
        <div id="tab2" class="tab" onclick="setTrip('ROUND TRIP', this)">ROUND TRIP</div>
    </div>
    
    <select id="cabType">
        <option>Hatchback</option><option>Sedan</option><option>SUV</option>
        <option>Innova Crysta</option><option>Tempo Traveller</option>
    </select>
    
    <input type="text" id="pickup" placeholder="From (Pickup)">
    <button class="btn-add" onclick="addDestination()">+ Add Via Destination</button>
    <div id="destinations"></div>
    <input type="text" id="drop" placeholder="To (Drop)">
    
    <div class="date-time-row">
        <input type="date" id="date">
        <input type="time" id="time">
    </div>
    
    <button class="btn-book" onclick="bookNow()">CHECK PRICE & BOOK NOW</button>
</div>

<div class="section">
    <h3 style="margin-top:0;">Why travel with Sai Cab Safar?</h3>
    <div class="feature-grid">
        <div class="feature-card"><i class="fa fa-car"></i><br>Safe Rides</div>
        <div class="feature-card"><i class="fa fa-user-tie"></i><br>Pro Drivers</div>
        <div class="feature-card"><i class="fa fa-clock"></i><br>24/7 Support</div>
        <div class="feature-card"><i class="fa fa-spray-can"></i><br>Clean Cabs</div>
    </div>
</div>

<script>
    let currentTrip = "ONE WAY";

    function setTrip(type, element) {
        currentTrip = type;
        document.getElementById('tab1').classList.remove('active');
        document.getElementById('tab2').classList.remove('active');
        element.classList.add('active');
    }

    function addDestination() {
        let input = document.createElement('input');
        input.type = 'text'; input.className = 'dest-input';
        input.placeholder = 'Add Via Destination';
        input.style.marginBottom = '8px';
        document.getElementById('destinations').appendChild(input);
    }

    function bookNow() {
        let pickup = document.getElementById('pickup').value;
        let drop = document.getElementById('drop').value;
        let cab = document.getElementById('cabType').value;
        let date = document.getElementById('date').value;
        let time = document.getElementById('time').value;
        let via = Array.from(document.querySelectorAll('.dest-input')).map(i => i.value).filter(v => v !== "").join(' -> ');
        
        if (pickup === "" || drop === "" || date === "" || time === "") {
            alert("कृपया सभी जानकारी भरें!");
        } else {
            let msg = `Booking Details:%0A------------------%0A Trip: ${currentTrip}%0ACab: ${cab}%0ADate: ${date}%0ATime: ${time}%0AFrom: ${pickup}${via ? '%0AVia: ' + via : ''}%0ATo: ${drop}`;
            window.open("https://wa.me/919049133130?text=" + msg, "_blank");
        }
    }
</script>

</body>
</html>
