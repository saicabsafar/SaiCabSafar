<script>
    function selectTrip(type, element) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('addBtn').style.display = (type === 'Round Trip') ? 'block' : 'none';
    }

    function addDestination() {
        let input = document.createElement('input');
        input.type = 'text'; input.className = 'dest-input';
        input.placeholder = 'Add Via Destination';
        input.style.marginBottom = '5px';
        document.getElementById('destinations').appendChild(input);
    }

    function bookNow() {
        // यहाँ हम सभी फील्ड्स की वैल्यू चेक करेंगे
        let from = document.getElementById('from').value;
        let to = document.getElementById('to').value;
        let cab = document.getElementById('cabType').value;
        
        // चेक करें कि क्या From और To खाली हैं
        if (from === "" || to === "") {
            alert("कृपया पिकअप और ड्रॉप दोनों स्थान भरें!");
            return; // आगे नहीं बढ़ने देगा
        }

        let via = Array.from(document.querySelectorAll('.dest-input')).map(i => i.value).filter(v => v !== "").join(' -> ');
        
        // अब WhatsApp लिंक खुलेगा
        window.open(`https://wa.me/919049133130?text=Booking Details:%0A------------------%0ACab: ${cab}%0AFrom: ${from}${via ? '%0AVia: ' + via : ''}%0ATo: ${to}`, '_blank');
    }

    function sendReview() {
        let name = document.getElementById('custName').value;
        let review = document.getElementById('custReview').value;
        
        if (name === "" || review === "") {
            alert("कृपया अपना नाम और रिव्यु दोनों भरें!");
            return;
        }
        window.open(`https://wa.me/919049133130?text=Customer Review:%0AFrom: ${name}%0AFeedback: ${review}`, '_blank');
    }
</script>
