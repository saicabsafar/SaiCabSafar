<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Premium Taxi Services</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        .hero { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 50px 20px; text-align: center; }
        .hero h1 { margin: 0; font-size: 2em; }
        .booking-card { background: white; width: 92%; max-width: 450px; margin: -30px auto 20px; padding: 25px; border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .features { display: flex; justify-content: space-around; padding: 20px; background: white; margin-top: 20px; }
        .feature-item { text-align: center; font-size: 0.8em; }
        .section { padding: 30px 20px; max-width: 600px; margin: auto; }
        /* Floating WhatsApp Button */
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="hero">
    <h1>Sai Cab Safar</h1>
    <p>प्रीमियम कैब सेवा, अब आपकी उंगलियों पर</p>
</div>

<div class="booking-card">
    <select id="tripType"><option>One Way</option><option>Round Trip</option></select>
    <input type="text" id="pickup" placeholder="पिकअप स्थान (Pickup)" required>
    <input type="text" id="drop" placeholder="ड्रॉप स्थान (Drop)" required>
    <input type="date" id="date">
    <button onclick="bookCab()">Search Cabs Now</button>
</div>

<div class="features">
    <div class="feature-item">✅ सुरक्षित<br>राइड्स</div>
    <div class="feature-item">✅ अनुभवी<br>ड्राइवर</div>
    <div class="feature-item">✅ 24/7<br>सेवा</div>
</div>

<div class="section">
    <h2>क्यों चुनें हमें?</h2>
    <p>साई कैब सफर के साथ, आप पाते हैं किफायती दाम और बेहतरीन अनुभव। हमारी गाड़ियाँ हर बुकिंग से पहले सैनिटाइज की जाती हैं और हमारे ड्राइवर आपके समय की कद्र करते हैं।</p>
</div>

<a href="https://wa.me/919049133130" class="whatsapp-float">💬 WhatsApp Chat</a>

<script>
    function bookCab() {
        var pickup = document.getElementById('pickup').value;
        var drop = document.getElementById('drop').value;
        var date = document.getElementById('date').value;
        var phone = "919049133130";

        if(pickup && drop && date) {
            var url = "https://wa.me/" + phone + "?text=Hello, I want to book a cab:%0A*Trip:* " + document.getElementById('tripType').value + "%0A*From:* " + pickup + "%0A*To:* " + drop + "%0A*Date:* " + date;
            window.open(url, '_blank');
        } else {
            alert("कृपया सभी जानकारी भरें!");
        }
    }
</script>
</body>
</html>
