<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Shirdi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sai Cab Safar</h1>
    <p>Nearby Sai Ashram Bhaktniwas, Shirdi</p>
</header>

<section class="booking-section">
    <h2>Book Your Cab</h2>
    <form id="bookingForm" onsubmit="sendWhatsApp(event)">
        <input type="text" id="pickup" placeholder="Pickup City" required>
        <input type="text" id="destination" placeholder="Destination" required>
        
        <select id="serviceType">
            <option value="One Way Trip">One Way Trip</option>
            <option value="Round Trip">Round Trip</option>
            <option value="Local / Airport">Local / Airport</option>
        </select>

        <input type="date" id="date" required>
        <input type="time" id="time" required>
        
        <button type="submit">Book on WhatsApp</button>
    </form>
</section>

<footer>
    <p>Contact: 9049133130</p>
    <p>Address: Nearby Sai Ashram Bhaktniwas, Shirdi, MH 423109</p>
</footer>

<script>
    function sendWhatsApp(event) {
        event.preventDefault();
        let pickup = document.getElementById("pickup").value;
        let dest = document.getElementById("destination").value;
        let service = document.getElementById("serviceType").value;
        let date = document.getElementById("date").value;
        let time = document.getElementById("time").value;

        let msg = `*New Booking Request*%0A%0A` +
                  `*Service:* ${service}%0A` +
                  `*Pickup:* ${pickup}%0A` +
                  `*Destination:* ${dest}%0A` +
                  `*Date:* ${date}%0A` +
                  `*Time:* ${time}`;

        window.open(`https://wa.me/919049133130?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
