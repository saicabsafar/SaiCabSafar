<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Premium Taxi Services</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; color: #333; }
        
        /* Hero Section with Image Overlay */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            color: white; padding: 80px 20px; text-align: center;
        }

        .booking-card { 
            background: white; width: 90%; max-width: 500px; margin: -50px auto 20px; 
            padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
        }

        input, select { 
            width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; 
            border-radius: 12px; font-size: 16px; 
        }

        button { 
            width: 100%; padding: 16px; background: #ff4757; color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #ff6b81; transform: scale(1.02); }

        .service-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="hero">
    <h1>साई कैब सफर</h1>
    <p>आपकी यात्रा, हमारा जुनून</p>
</div>

<div class="booking-card">
    <h3 style="margin-top:0;">राइड बुक करें</h3>
    <select id="cabType">
        <option>Sedan (4 Seats)</option>
        <option>SUV (6 Seats)</option>
        <option>Hatchback</option>
    </select>
    <input type="text" id="pickup" placeholder="पिकअप शहर">
    <input type="text" id="drop" placeholder="ड्रॉप शहर">
    <button onclick="bookCab()">Search Cabs</button>
</div>

<div class="service-cards">
    <div class="card"><i class="fas fa-car" style="color:#007bff; font-size:24px;"></i><br>सस्ता किराया</div>
    <div class="card"><i class="fas fa-shield-alt" style="color:#27ae60; font-size:24px;"></i><br>सुरक्षित यात्रा</div>
</div>

<a href="https://wa.me/919049133130" class="whatsapp-float">💬 WhatsApp Chat</a>

<script>
    function bookCab() {
        var pickup = document.getElementById('pickup').value;
        var drop = document.getElementById('drop').value;
        var cab = document.getElementById('cabType').value;
        var phone = "919049133130";

        if(pickup && drop) {
            var url = "https://wa.me/" + phone + "?text=नमस्ते, मुझे एक कैब चाहिए:%0Aगाड़ी: " + cab + "%0Aपिकअप: " + pickup + "%0Aड्रॉप: " + drop;
            window.open(url, '_blank');
        } else {
            alert("कृपया शहर का नाम भरें!");
        }
    }
</script>
</body>
</html>
