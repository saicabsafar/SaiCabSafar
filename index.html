<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .hero { background: #0a1f44; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .box { background: white; margin: 15px; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; background: #eee; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tab.active { background: #ffc107; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-book { background: #ffc107; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="hero">SAI CAB SAFAR</div>

<div class="box">
    <div class="tab-bar">
        <div id="tab1" class="tab active" onclick="setTrip('ONE WAY', this)">ONE WAY</div>
        <div id="tab2" class="tab" onclick="setTrip('ROUND TRIP', this)">ROUND TRIP</div>
    </div>
    
    <select id="cabType">
        <option>Hatchback</option><option>Sedan</option><option>SUV</option>
        <option>Innova Crysta</option><option>Tempo Traveller</option>
    </select>
    
    <input type="text" id="pickup" placeholder="From (Pickup)">
    <input type="text" id="drop" placeholder="To (Drop)">
    
    <button class="btn-book" onclick="bookNow()">CHECK PRICE & BOOK NOW</button>
</div>

<script>
    let currentTrip = "ONE WAY";

    function setTrip(type, element) {
        currentTrip = type;
        document.getElementById('tab1').classList.remove('active');
        document.getElementById('tab2').classList.remove('active');
        element.classList.add('active');
    }

    function bookNow() {
        let pickup = document.getElementById('pickup').value;
        let drop = document.getElementById('drop').value;
        let cab = document.getElementById('cabType').value;
        
        if (pickup === "" || drop === "") {
            alert("कृपया Pickup और Drop दोनों भरें!");
        } else {
            let msg = `Booking: ${currentTrip}%0ACab: ${cab}%0AFrom: ${pickup}%0ATo: ${drop}`;
            window.open("https://wa.me/919049133130?text=" + msg, "_blank");
        }
    }
</script>

</body>
</html>
