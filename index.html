<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Shirdi Taxi Service</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; margin: 0; padding: 0; }
        header { background: #5b32a6; color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .search-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-book { width: 100%; padding: 15px; background: #25d366; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .fleet-card { background: white; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .fleet-img { width: 100%; height: 200px; object-fit: cover; }
        .details { padding: 15px; }
    </style>
</head>
<body>

<header>
    <h1>Sai Cab Safar</h1>
    <p>Shirdi's Best Taxi Service</p>
</header>

<div class="container">
    <div class="search-box">
        <h3>🚖 अपनी टैक्सी बुक करें</h3>
        <select>
            <option>वन-वे (One Way)</option>
            <option>राउंड-ट्रिप (Round Trip)</option>
            <option>लोकल पैकेज (Local)</option>
        </select>
        <input type="text" placeholder="कहाँ से (From Location)">
        <input type="text" placeholder="कहाँ तक (To Destination)">
        <input type="date">
        <button class="btn-book">WhatsApp पर बुक करें</button>
    </div>

    <h2 style="text-align:center;">हमारी फ्लीट (Fleet)</h2>
    <div class="fleet-card"><img src="sedan.jpg.jpg" class="fleet-img"><h3>Sedan (Dzire/Etios)</h3></div>
    <div class="fleet-card"><img src="InnovaCrysta.jpg.jpeg" class="fleet-img"><h3>Innova Crysta</h3></div>
    <div class="fleet-card"><img src="TempoTraveller.jpg.jpeg" class="fleet-img"><h3>Tempo Traveller</h3></div>
    <div class="fleet-card"><img src="ertiga.jpg.jpeg" class="fleet-img"><h3>Ertiga</h3></div>
    <div class="fleet-card"><img src="hatchback.jpg.webp" class="fleet-img"><h3>Hatchback</h3></div>
</div>

</body>
</html>
