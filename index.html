<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - आपकी सुरक्षित यात्रा</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        p { color: #555; text-align: center; font-size: 0.9em; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #219150; }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ साई कैब सफर ✨</h1>
    <p>आपकी यात्रा, हमारी जिम्मेदारी। बुकिंग के लिए नीचे विवरण भरें:</p>
    
    <form id="bookingForm">
        <input type="text" id="name" placeholder="आपका नाम" required>
        <input type="text" id="pickup" placeholder="पिकअप स्थान" required>
        <input type="text" id="drop" placeholder="ड्रॉप स्थान" required>
        <input type="tel" id="phone" placeholder="आपका मोबाइल नंबर" required>
        <button type="submit" id="submitBtn">अभी बुक करें</button>
    </form>
</div>

<script>
    // यहाँ अपना Google Apps Script का URL डालें जो आपको पिछली बार मिला था
    const scriptURL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let btn = document.getElementById('submitBtn');
        btn.innerText = "भेज रहा हूँ...";
        
        let formData = {
            name: document.getElementById('name').value,
            pickup: document.getElementById('pickup').value,
            drop: document.getElementById('drop').value,
            phone: document.getElementById('phone').value
        };

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData) 
        })
        .then(() => {
            alert("धन्यवाद! आपकी बुकिंग रिक्वेस्ट मिल गई है।");
            document.getElementById('bookingForm').reset();
            btn.innerText = "अभी बुक करें";
        })
        .catch(err => {
            alert("कुछ गलती हुई, कृपया फिर से प्रयास करें।");
            btn.innerText = "अभी बुक करें";
        });
    });
</script>

</body>
</html>
