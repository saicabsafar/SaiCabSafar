<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Shirdi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.min.css">
    <style>
        body { font-family: sans-serif; background: #f3f1f7; padding: 20px; }
        .search-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-add-dest { display: none; margin-top: 10px; padding: 10px; background: #eee; border: 2px dashed #5b32a6; cursor: pointer; text-align: center; color: #5b32a6; font-weight: bold; }
    </style>
</head>
<body>

<div class="search-box">
    <h3>🚖 ऑनलाइन गाड़ी बुक करें</h3>
    <div>
        <input type="radio" name="trip" id="oneway" checked onclick="toggleDest(false)"> <label for="oneway">वन-वे</label>
        <input type="radio" name="trip" id="round" onclick="toggleDest(true)"> <label for="round">राउंड-ट्रिप</label>
    </div>
    <div class="form-group"><input type="text" id="fromLoc" placeholder="कहाँ से (From)..."></div>
    <div class="form-group"><input type="text" id="toLoc" placeholder="कहाँ तक (To)..."></div>
    <div id="dynamicDestinations"></div>
    <div id="btnAddDest" class="btn-add-dest" onclick="addDest()">➕ अगला शहर जोड़ें</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
<script>
    function initAC(id) {
        new autoComplete({
            selector: "#" + id,
            data: { src: async (q) => { 
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&countrycodes=in&limit=5`);
                return (await res.json()).map(i => i.display_name);
            }},
            events: { input: { selection: (e) => { document.querySelector("#" + id).value = e.detail.selection.value; }}}
        });
    }
    initAC("fromLoc"); initAC("toLoc");

    function toggleDest(show) { document.getElementById('btnAddDest').style.display = show ? 'block' : 'none'; }
    function addDest() {
        var id = "extra_" + Date.now();
        document.getElementById('dynamicDestinations').innerHTML += `<div class="form-group"><input type="text" id="${id}" placeholder="अगला शहर..."></div>`;
        initAC(id);
    }
</script>
</body>
</html>
