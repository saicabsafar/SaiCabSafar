<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Premium Taxi Services</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0a1f44; --accent: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; }
        header { background: var(--primary); color: white; padding: 25px 10px; text-align: center; font-weight: 900; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 5px solid var(--accent); }
        .booking-box { background: white; margin: -20px 15px 20px 15px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; background: #eee; text-align: center; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .tab.active { background: var(--accent); color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-book { background: var(--accent); color: var(--primary); padding: 15px; width: 100%; border: none; font-weight: bold; font-size: 16px; border-radius: 4px; cursor: pointer; }
        .section { padding: 20px; background: white; margin-top: 15px; }
        .review-card { border-left: 4px solid var(--accent); padding: 10px; background: #f9f9f9; margin-bottom: 15px; font-style: italic; }
        .footer { text-align: center; padding: 20px; background: #333; color: white; margin-top: 20px; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 20px; border-radius: 50px; text-decoration: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>Sai Cab Safar</header>

<div class="booking-box">
    <div class="tab-bar">
        <div class="tab active" onclick="selectTrip('One Way', this)">ONE WAY</div>
        <div class="tab" onclick="selectTrip('Round Trip', this)">ROUND TRIP</div>
    </div>
    <select id="cabType">
        <option>Hatchback</option><option>Sedan</option><option>SUV</option>
        <option>Innova Crysta</option><option>Tempo Traveller</option>
    </select>
    <input type="text" id="from" placeholder="From (Pickup)">
    <div id="destinations"><input type="text" class="dest-input" placeholder="To (Drop)"></div>
    <button class="btn-book" onclick="bookNow()">CHECK PRICE & BOOK NOW</button>
</div>

<div class="section">
    <h2>Customer Testimonials</h2>
    <div class="review-card">"बहुत ही शानदार सर्विस! ड्राइवर समय पर आए और गाड़ी बहुत साफ़ थी।" - <b>राहुल शर्मा</b></div>
    <div class="review-card">"किफायती दाम और सुरक्षित सफर। साई कैब सफर सबसे बेस्ट है।" - <b>प्रिया पटेल</b></div>
    <p style="font-size:12px; color:#555;">आप अपना रिव्यु WhatsApp पर भेजें, हम यहाँ जोड़ देंगे!</p>
</div>

<div class="footer">
    <p>Customer Care: <a href="tel:9049133130" style="color:var(--accent)">9049133130</a></p>
</div>

<a href="https://wa.me/919049133130" class="wa-float"><i class="fab fa-whatsapp"></i> Chat</a>

<script>
    function selectTrip(type, element) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
    }
    function bookNow() {
        let from = document.getElementById('from').value;
        let dests = Array.from(document.querySelectorAll('.dest-input')).map(i => i.value).join(', ');
        window.open(`https://wa.me/919049133130?text=Booking: From ${from} to ${dests}`, '_blank');
    }
</script>
</body>
</html>
