<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaiCabSafar – Taxi Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#ffc107;padding:15px;text-align:center}
section{padding:20px}
.box{background:#fff;padding:20px;border-radius:8px;margin-bottom:15px}
input,select,button{width:100%;padding:10px;margin:8px 0}
button{background:#000;color:#fff;border:none;border-radius:5px}
.lang button{width:auto;margin:5px}
.call{background:green}
.wa{background:#25D366}
</style>

<script>
function setLang(lang){
  document.querySelectorAll("[data-en]").forEach(el=>{
    el.innerText = el.getAttribute("data-"+lang);
  });
}
</script>
</head>

<body onload="setLang('en')">

<header>
<h2 data-en="🚖 SaiCabSafar"
    data-hi="🚖 साई कैब सफर"
    data-mr="🚖 साई कॅब सफर"></h2>

<p data-en="Local | One-Way | Round Trip Taxi"
   data-hi="लोकल | वन-वे | राउंड ट्रिप टैक्सी"
   data-mr="लोकल | वन-वे | राउंड ट्रिप टॅक्सी"></p>

<p>📞 9850063242</p>

<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('hi')">हिंदी</button>
<button onclick="setLang('mr')">मराठी</button>
</div>
</header>

<section class="box">
<h3 data-en="Book a Taxi"
    data-hi="टैक्सी बुक करें"
    data-mr="टॅक्सी बुक करा"></h3>

<input placeholder="Pickup Location">
<input placeholder="Drop Location">

<select>
<option>Local</option>
<option>One-Way</option>
<option>Round Trip</option>
</select>

<input type="date">

<button data-en="Submit Booking"
        data-hi="बुकिंग भेजें"
        data-mr="बुकिंग पाठवा"></button>

<a href="tel:9850063242">
<button class="call">📞 Call Now</button>
</a>

<a href="https://wa.me/919850063242">
<button class="wa">💬 WhatsApp Booking</button>
</a>
</section>

<section class="box">
<h3 data-en="Why SaiCabSafar?"
    data-hi="SaiCabSafar क्यों?"
    data-mr="SaiCabSafar का निवडावे?"></h3>

<p data-en="✔ Verified Drivers ✔ Affordable Fare ✔ 24x7 Service"
   data-hi="✔ सत्यापित ड्राइवर ✔ किफायती किराया ✔ 24x7 सेवा"
   data-mr="✔ सत्यापित ड्रायव्हर ✔ परवडणारे भाडे ✔ 24x7 सेवा"></p>

<p data-en="Service Areas: Shirdi, Ahmednagar, Pune, Mumbai"
   data-hi="सेवा क्षेत्र: शिर्डी, अहमदनगर, पुणे, मुंबई"
   data-mr="सेवा क्षेत्र: शिर्डी, अहमदनगर, पुणे, मुंबई"></p>
</section>

</body>
</html>
