<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Professional Cab Booking</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; }
        .hero { background: #007bff; color: white; padding: 50px 20px; text-align: center; }
        .booking-card { background: white; width: 90%; max-width: 500px; margin: -40px auto 20px; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #ffc107; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Sai Cab Safar</h1>
    <p>Safe & Reliable Cab Service</p>
</div>

<div class="booking-card">
    <select id="tripType">
        <option value="One Way">One Way</option>
        <option value="Round Trip">Round Trip</option>
    </select>
    <input type="text" id="pickup" placeholder="From (Pickup City)">
    <input type="text" id="drop" placeholder="To (Drop City)">
    <input type="date" id="date">
    <button onclick="bookCab()">Search Cabs</button>
</div>

<script>
    function bookCab() {
        var pickup = document.getElementById('pickup').value;
        var drop = document.getElementById('drop').value;
        var date = document.getElementById('date').value;
        var phone = "919049133130";

        var url = "https://wa.me/" + phone + "?text=Hello, I want to book a cab:%0AFrom: " + pickup + "%0ATo: " + drop + "%0ADate: " + date;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
