<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Cab Safar - Shirdi Premium Taxi Service</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.min.css">
    <style>
        /* CSS कोड वही रखें जो पहले था, ताकि डिज़ाइन न बिगड़े */
        body { font-family: sans-serif; background: #f3f1f7; }
        .search-box { background: white; padding: 20px; border-radius: 15px; margin: 20px; }
        .btn-add-dest { background: #fff; color: #5b32a6; border: 2px dashed #5b32a6; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="search-box">
        <h3>🚖 ऑनलाइन गाड़ी बुक करें</h3>
        
        <div class="trip-types">
            <input type="radio" id="oneway" name="triptype" value="One Way" checked onclick="toggleMultiDest(false)">
            <label for="oneway">वन-वे</label>
            <input type="radio" id="roundtrip" name="triptype" value="Round Trip" onclick="toggleMultiDest(true)">
            <label for="roundtrip">राउंड-ट्रिप</label>
        </div>
        
        <div class="form-group">
            <label>कहाँ से</label>
            <input type="text" id="fromLoc" placeholder="शहर का नाम लिखें...">
        </div>
        <div class="form-group">
            <label>कहाँ तक</label>
            <input type="text" id="toLoc" placeholder="शहर का नाम लिखें...">
        </div>

        <div id="dynamicDestinations"></div>
        <div id="btnAddDest" class="btn-add-dest" onclick="addExtraDestination()">➕ अगला शहर जोड़ें</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
    <script>
        function initAutocomplete(inputId) {
            new autoComplete({
                selector: "#" + inputId,
                data: {
                    src: async (query) => {
                        const source = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=in&limit=5`);
                        const data = await source.json();
                        return data.map(item => item.display_name);
                    }
                },
                resultItem: { highlight: true },
                events: { input: { selection: (event) => { document.querySelector("#" + inputId).value = event.detail.selection.value; } } }
            });
        }

        // शुरुआत में इनपुट को इनिशियलाइज़ करें
        initAutocomplete("fromLoc");
        initAutocomplete("toLoc");

        function toggleMultiDest(show) {
            document.getElementById('btnAddDest').style.display = show ? 'block' : 'none';
        }

        function addExtraDestination() {
            var container = document.getElementById('dynamicDestinations');
            var randId = "extra_" + Date.now();
            container.innerHTML += `<div class="form-group"><input type="text" id="${randId}" placeholder="अगला शहर..."></div>`;
            initAutocomplete(randId);
        }
    </script>
</body>
</html>
